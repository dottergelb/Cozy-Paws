services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cozypaws
      POSTGRES_USER: cozypaws
      POSTGRES_PASSWORD: cozypaws_local_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cozypaws -d cozypaws"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: local-docker-secret-change-before-production-8c2a6bd1d27b4e6a
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgresql://cozypaws:cozypaws_local_password@db:5432/cozypaws
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      GUNICORN_WORKERS: "2"
    ports:
      - "0.0.0.0:8000:8000"

volumes:
  postgres_data:
