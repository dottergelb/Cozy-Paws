services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cozypaws
      POSTGRES_USER: cozypaws
      POSTGRES_PASSWORD: cozypaws_local_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cozypaws -d cozypaws"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-local-docker-secret-change-before-production-8c2a6bd1d27b4e6a}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      DATABASE_URL: ${DATABASE_URL:-postgresql://cozypaws:cozypaws_local_password@db:5432/cozypaws}
      SUPABASE_AUTH_ENABLED: ${SUPABASE_AUTH_ENABLED:-False}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_AUTH_REDIRECT_TO: ${SUPABASE_AUTH_REDIRECT_TO:-}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      GUNICORN_WORKERS: "2"
    ports:
      - "0.0.0.0:8000:8000"

volumes:
  postgres_data:
