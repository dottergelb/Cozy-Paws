{% extends "base.html" %}
{% block title %}Сообщение - Cozy Paws{% endblock %}
{% block content %}
<section class="auth-card">
    <h1>Сообщение</h1>
    <p class="muted">Получатель: {{ target.public_name }}</p>
    <form method="post" class="stack-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button primary" type="submit">Отправить</button>
    </form>
</section>
{% endblock %}
