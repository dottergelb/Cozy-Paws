{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Cozy Paws{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'game/css/styles.css' %}">
    <script src="{% static 'game/js/app.js' %}" defer></script>
</head>
<body>
<svg class="svg-sprite" aria-hidden="true">
    <symbol id="i-paw" viewBox="0 0 24 24"><path d="M7.4 10.2c1.1-.3 1.6-1.9 1.1-3.5S6.8 4.1 5.7 4.5 4.1 6.4 4.6 8s1.7 2.6 2.8 2.2Zm9.2 0c1.1.4 2.4-.6 2.9-2.2s0-3.2-1.2-3.5-2.3.6-2.8 2.2 0 3.2 1.1 3.5ZM12 9.1c1.3 0 2.3-1.4 2.3-3.1S13.3 3 12 3 9.7 4.4 9.7 6s1 3.1 2.3 3.1Zm-5.2 4.1c-1.9 1.5-2.2 4.8.4 6.2 2.1 1.1 3.2-.3 4.8-.3s2.8 1.4 4.8.3c2.6-1.4 2.3-4.7.4-6.2-1.7-1.3-3-.9-4.1-.3-.7.4-1.5.4-2.2 0-1.1-.6-2.4-1-4.1.3Z"/></symbol>
    <symbol id="i-coin" viewBox="0 0 24 24"><path d="M12 3C7 3 3 5 3 7.5v9C3 19 7 21 12 21s9-2 9-4.5v-9C21 5 17 3 12 3Zm0 2c4.2 0 7 1.5 7 2.5S16.2 10 12 10 5 8.5 5 7.5 7.8 5 12 5Zm0 14c-4.2 0-7-1.5-7-2.5v-1.8c1.6 1.1 4.1 1.8 7 1.8s5.4-.7 7-1.8v1.8c0 1-2.8 2.5-7 2.5Zm0-4.5c-4.2 0-7-1.5-7-2.5v-1.8c1.6 1.1 4.1 1.8 7 1.8s5.4-.7 7-1.8V12c0 1-2.8 2.5-7 2.5Z"/></symbol>
    <symbol id="i-bag" viewBox="0 0 24 24"><path d="M7 7V6a5 5 0 0 1 10 0v1h2.2l1 14H3.8l1-14H7Zm2 0h6V6a3 3 0 1 0-6 0v1Zm-2.3 2-.7 10h12l-.7-10H17v2h-2V9H9v2H7V9h-.3Z"/></symbol>
    <symbol id="i-star" viewBox="0 0 24 24"><path d="m12 2.7 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2-5.6-2.9-5.6 2.9 1.1-6.2L3 9.3l6.2-.9L12 2.7Z"/></symbol>
</svg>
<div class="app-shell">
    <header class="topbar">
        <a class="brand" href="{% url 'home' %}" aria-label="Cozy Paws">
            <span class="brand-mark"><svg><use href="#i-paw"></use></svg></span>
            <span>Cozy Paws</span>
        </a>
        {% if user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button class="icon-button" title="Выйти" aria-label="Выйти">
                    <svg><use href="#i-paw"></use></svg>
                </button>
            </form>
        {% else %}
            <a class="small-link" href="{% url 'login' %}">Войти</a>
        {% endif %}
    </header>

    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>

    <nav class="bottom-nav" aria-label="Основная навигация">
        <a href="{% url 'dashboard' %}"><svg><use href="#i-paw"></use></svg><span>Питомец</span></a>
        <a href="{% url 'shop' %}"><svg><use href="#i-coin"></use></svg><span>Магазин</span></a>
        <a href="{% url 'wardrobe' %}"><svg><use href="#i-bag"></use></svg><span>Гардероб</span></a>
        <a href="{% url 'social' %}"><svg><use href="#i-star"></use></svg><span>Соц</span></a>
    </nav>
</div>
</body>
</html>
