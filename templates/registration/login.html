{% extends "base.html" %}
{% block title %}Вход - Cozy Paws{% endblock %}
{% block content %}
<section class="auth-card">
    <h1>Вход</h1>
    <form method="post" class="stack-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button primary" type="submit">Войти</button>
    </form>
    <p class="muted">Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
</section>
{% endblock %}
