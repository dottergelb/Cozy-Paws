{% extends "base.html" %}
{% block title %}Регистрация - Cozy Paws{% endblock %}
{% block content %}
<section class="auth-card">
    <h1>Регистрация</h1>
    <form method="post" class="stack-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button primary" type="submit">Создать аккаунт</button>
    </form>
    <p class="muted">Уже играешь? <a href="{% url 'login' %}">Войти</a></p>
</section>
{% endblock %}
